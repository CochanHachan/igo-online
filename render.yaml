services:
  - type: web
    name: igo-online-server
    runtime: python
    rootDir: server
    buildCommand: pip install poetry && poetry install --no-root
    startCommand: poetry run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
    disk:
      name: igo-data
      mountPath: /data
      sizeGB: 1
